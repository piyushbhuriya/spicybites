<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spicy Bites</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:lightgray;
    }

    /* Navbar */

    nav{
      background:orangered;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
    }

    .logo{
      font-size:25px;
      font-weight:bold;
    }

    .menu a{
      color:white;
      text-decoration:none;
      margin-left:15px;
      font-size:18px;
    }

    /* Hero */

    .hero{
      height:90vh;
      background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero-content{
      background:rgba(0,0,0,0.5);
      padding:25px;
      border-radius:10px;
    }

    .hero h1{
      font-size:45px;
      margin-bottom:10px;
    }

    .hero p{
      font-size:20px;
      margin-bottom:15px;
    }

    .btn{
      display:inline-block;
      padding:10px 20px;
      background:orangered;
      color:white;
      text-decoration:none;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    /* Order List */

    .foods{
      padding:40px 20px;
      text-align:center;
    }

    .foods h2{
      margin-bottom:30px;
      font-size:35px;
      color:black;
    }

    .food-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card h3{
      margin:15px 0 10px;
    }

    .card p{
      padding-bottom:15px;
      color:gray;
    }

    .order-btn{
      margin-bottom:15px;
      padding:10px 20px;
      background:orangered;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    footer{
      background:black;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:30px;
    }

    /* Mobile */

    @media(max-width:600px){

      .hero h1{
        font-size:30px;
      }

      .hero p{
        font-size:16px;
      }

      .menu a{
        font-size:14px;
        margin-left:8px;
      }

    }

  </style>
</head>

<body>

  <!-- Navbar -->

  <nav>

    <div class="logo">Spicy Bites</div>

    <div class="menu">
      <a href="#">Home</a>

      <a href="#" onclick="showMenuImage()">
        Menu
      </a>

      <a href="tel: +919358331708">Contact</a>
    </div>

  </nav>

  <!-- Hero -->

  <section class="hero">

    <div class="hero-content">

      <h1>Welcome to Spicy Bites</h1>

      <p>Delicious Food Made With Love</p>

      <button class="btn">
        Order Now
      </button>

    </div>

  </section>

  <!-- Order List -->

  <section class="foods">

    <h2>Order Items</h2>

    <div class="food-container">

      <div class="card">

        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1000">

        <h3>Cheese Pizza</h3>

        <p>₹199</p>

        <button class="order-btn">
          Add to Cart
        </button>

      </div>

      <div class="card">

        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1000">

        <h3>Chicken Burger</h3>

        <p>₹149</p>

        <button class="order-btn">
          Add to Cart
        </button>

      </div>

      <div class="card">

        <img src="https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb?q=80&w=1000">

        <h3>White Sauce Pasta</h3>

        <p>₹179</p>

        <button class="order-btn">
          Add to Cart
        </button>

      </div>

    </div>

  </section>

  <footer>

    © 2026 Spicy Bites

  </footer>

  <script>

    function showMenuImage(){

      document.getElementById("menuImage").style.display = "block";

    }

  </script>

</body>
</html>
